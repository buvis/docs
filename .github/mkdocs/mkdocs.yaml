---
site_name: BUVIS
site_description: Bob's Universal and Very Intelligent System
site_author: Tomáš Bouška
site_url: https://docs.buvis.net

repo_name: buvis/docs
repo_url: https://github.com/buvis/docs
edit_uri: "edit/main/docs/"

theme:
  name: material
  icon:
    repo: fontawesome/brands/github-alt
  language: en
  features:
  - navigation.sections
  - navigation.tracking
  - search.share
  - search.suggest
  palette:
  - scheme: default
    primary: deep purple
    accent: indigo
    toggle:
      icon: material/lightbulb-outline
      name: Switch to dark mode
  - scheme: slate
    primary: deep purple
    accent: indigo
    toggle:
      icon: material/lightbulb
      name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

docs_dir: ../../src

# Plugins
plugins:
# https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/#built-in-search
- search
# https://squidfunk.github.io/mkdocs-material/setup/adding-a-git-repository/#revision-date-localized
- git-revision-date-localized
- minify:
    minify_html: true

# Customization
extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/tbouska

copyright: Copyright &copy; 2022 Tomáš Bouška

# https://www.mkdocs.org/user-guide/configuration/#markdown_extensions
markdown_extensions:
- admonition
- meta
- codehilite:
    noclasses: "True"
    pygments_style: tango
- toc:
    permalink: true
- pymdownx.superfences

# Page tree
nav:
- Overview: index.md
- Home:
  - Overview: home/index.md
  - Installation: home/installation.md
  - Post-install: home/post-install.md
  - Operations: home/operations.md
  - Catalogue: home/catalogue/index.md
- Cluster:
  - Overview: cluster/index.md
  - Installation: cluster/installation.md
  - Update: cluster/update.md
  - Recreate: cluster/recreate.md
  - GitOps: cluster/gitops.md
  - Troubleshooting: cluster/troubleshooting.md
  - Abandoned: cluster/abandoned.md
  - High Availability: cluster/high-availability.md
  - Namespaces:
    - flux-system: cluster/namespaces/flux-system.md
    - gtd: cluster/namespaces/gtd.md
    - hajimari: cluster/namespaces/hajimari.md
    - kube-system: cluster/namespaces/kube-system.md
    - media: cluster/namespaces/media.md
    - minio-operator: cluster/namespaces/minio-operator.md
    - monitoring: cluster/namespaces/monitoring.md
    - network: cluster/namespaces/network.md
    - openfaas: cluster/namespaces/openfaas.md
    - smarthome: cluster/namespaces/smarthome.md
    - system-upgrade: cluster/namespaces/system-upgrade.md
    - vpn: cluster/namespaces/vpn.md
  - Catalogue: cluster/catalogue/index.md
